name: PR checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Download modules
        run: go mod tidy && go mod download

      - name: go vet
        run: go vet ./...

      - name: Tests (Linux/macOS with -race)
        if: runner.os != 'Windows'
        run: go test -p 1 -count=1 -timeout 120s -race ./...

      - name: Tests (Windows without -race)
        if: runner.os == 'Windows'
        run: go test -p 1 -count=1 -timeout 120s ./...

  e2e-go:
    name: Go E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Download modules
        run: go mod tidy && go mod download

      - name: Go E2E tests
        run: go test -p 1 ./e2e/... -v -count=1 -timeout 120s

  e2e-shell:
    name: Shell E2E smoke (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Download modules
        run: go mod tidy && go mod download

      - name: Build
        run: |
          mkdir -p dist
          CGO_ENABLED=0 go build -v \
            -ldflags "-s -w -X openclaw-go/internal/gateway.Version=pr-check" \
            -o dist/openclaw \
            ./cmd/openclaw
          echo "Built: $(ls -lh dist/openclaw | awk '{print $5}')"

      - name: Shell E2E
        run: bash scripts/e2e.sh

  e2e-ps:
    name: PowerShell E2E smoke (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Download modules
        shell: pwsh
        run: go mod download || go mod download

      - name: Build Windows binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $env:CGO_ENABLED = "0"
          go build -v -ldflags "-s -w -X openclaw-go/internal/gateway.Version=pr-check" -o dist\openclaw.exe .\cmd\openclaw
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Write-Host "Built: $((Get-Item dist\openclaw.exe).Length) bytes"

      - name: PowerShell E2E
        shell: pwsh
        run: .\scripts\e2e.ps1 -SkipBuild

  docker-build:
    name: Docker build (PR)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          tags: openclaw-go:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Download modules
        run: go mod tidy && go mod download

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout 5m

  all-checks-passed:
    name: All checks passed
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-go, e2e-shell, e2e-ps, docker-build, lint]
    if: always()

    steps:
      - name: Evaluate results
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          echo "Results: $NEEDS"
          if echo "$NEEDS" | grep -q '"result":"failure"'; then
            echo "One or more checks failed." && exit 1
          fi
          if echo "$NEEDS" | grep -q '"result":"cancelled"'; then
            echo "One or more checks were cancelled." && exit 1
          fi
          echo "All checks passed."
