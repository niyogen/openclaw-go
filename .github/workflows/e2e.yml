name: E2E

on:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Go in-process E2E (no binary, no external server) ─────────────────────
  e2e-go:
    name: Go E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Download modules
        run: go mod tidy && go mod download

      - name: Go E2E tests
        run: go test ./e2e/... -v -count=1 -timeout 90s

  # ── Shell smoke test (real binary + curl on Linux) ─────────────────────────
  e2e-shell:
    name: Shell E2E (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Download modules
        run: go mod tidy && go mod download

      - name: Build binary
        run: |
          mkdir -p dist
          CGO_ENABLED=0 go build -v \
            -ldflags "-s -w -X openclaw-go/internal/gateway.Version=e2e-ci" \
            -o dist/openclaw \
            ./cmd/openclaw
          echo "Built: $(ls -lh dist/openclaw)"

      - name: Run shell E2E
        run: bash scripts/e2e.sh

  # ── PowerShell smoke test (real binary + Invoke-WebRequest on Windows) ─────
  e2e-powershell:
    name: PowerShell E2E (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Download modules
        shell: pwsh
        run: go mod tidy; go mod download

      - name: Build Windows binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $env:CGO_ENABLED = "0"
          go build -v -ldflags "-s -w -X openclaw-go/internal/gateway.Version=e2e-ci" -o dist\openclaw.exe .\cmd\openclaw
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Write-Host "Built: $((Get-Item dist\openclaw.exe).Length) bytes"

      - name: Run PowerShell E2E
        shell: pwsh
        run: .\scripts\e2e.ps1 -SkipBuild
