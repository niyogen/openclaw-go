name: E2E

on:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Go in-process E2E suite ────────────────────────────────────────────────
  # These run the gateway in-process; no external port or binary needed.
  e2e-go:
    name: Go E2E (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Run Go E2E tests
        run: go test ./e2e/... -v -count=1 -timeout 90s

  # ── Shell smoke test (binary + curl) ──────────────────────────────────────
  e2e-shell:
    name: Shell E2E (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build binary
        shell: bash
        run: |
          mkdir -p dist
          CGO_ENABLED=0 go build \
            -ldflags "-s -w -X openclaw-go/internal/gateway.Version=e2e-ci" \
            -o dist/openclaw \
            ./cmd/openclaw

      - name: Run shell E2E smoke test
        shell: bash
        run: bash scripts/e2e.sh

  # ── PowerShell smoke test (binary + Invoke-WebRequest) ───────────────────
  e2e-powershell:
    name: PowerShell E2E (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Download modules
        run: go mod download

      - name: Build Windows binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $env:CGO_ENABLED = "0"
          go build -ldflags "-s -w -X openclaw-go/internal/gateway.Version=e2e-ci" -o dist\openclaw.exe .\cmd\openclaw

      - name: Run PowerShell E2E smoke test
        shell: pwsh
        run: .\scripts\e2e.ps1 -SkipBuild
