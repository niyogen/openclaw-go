name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GOTOOLCHAIN: local

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }} / Go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.22", "1.24"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      # Retry module download on cache miss (tar restore can fail transiently).
      - name: Download modules
        run: |
          go mod download || go mod download || go mod download

      - name: Vet
        run: go vet ./...

      # Run packages serially (-p 1) with the race detector to eliminate any
      # timing-sensitive interactions between concurrently-running test binaries.
      - name: Test (Linux / macOS — with race detector)
        if: runner.os != 'Windows'
        run: go test -p 1 -count=1 -timeout 120s -race ./...

      - name: Test (Windows — CGO disabled, no -race)
        if: runner.os == 'Windows'
        run: go test -p 1 -count=1 -timeout 120s ./...

      - name: Integration tests (network, Linux + Go 1.24 only)
        if: runner.os == 'Linux' && matrix.go == '1.24'
        run: go test -tags=integration -p 1 -count=1 -timeout 120s ./...

  build:
    name: Build binary
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Download modules
        run: go mod download || go mod download

      - name: Build
        run: |
          VERSION=$(cat VERSION 2>/dev/null || echo dev)
          mkdir -p dist
          CGO_ENABLED=0 go build -v \
            -trimpath \
            -ldflags "-s -w -X openclaw-go/internal/gateway.Version=${VERSION}" \
            -o dist/openclaw \
            ./cmd/openclaw
          echo "Binary size: $(ls -lh dist/openclaw | awk '{print $5}')"

      - uses: actions/upload-artifact@v4
        with:
          name: openclaw-linux-amd64-${{ github.sha }}
          path: dist/openclaw
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Download modules
        run: go mod download || go mod download

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout 5m
